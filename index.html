<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARGEA — Valorant eSports Organization</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#050807;
      --bg2:#0b0f0d;

      --green:#00ff9c;
      --green-soft:#00c97a;
      --green-glow:rgba(0,255,156,0.25);

      --card:#0f1412;
      --text:#eafff6;
      --muted:#5f7a6f;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:Rajdhani, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    /* NAV */
    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 40px;
      position:sticky;
      top:0;
      background:rgba(5,8,7,0.8);
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(0,255,156,0.1);
    }

    .brand{
      font-family:Orbitron;
      letter-spacing:3px;
      font-size:20px;
    }

    .brand span{color:var(--green)}

    .nav-links a{
      margin:0 10px;
      color:var(--muted);
      text-decoration:none;
    }

    .nav-links a:hover{color:var(--green)}

    /* HERO */
    .hero{
      text-align:center;
      padding:140px 20px 100px;
    }

    .hero h1{
      font-family:Orbitron;
      font-size:90px;
      letter-spacing:6px;
      color:#fff;
      text-shadow:0 0 20px var(--green-glow);
      animation:flicker 3s infinite;
    }

    .hero h1 span{color:var(--green)}

    .hero p{
      color:var(--muted);
      margin-top:15px;
      letter-spacing:2px;
    }

    .btn{
      display:inline-block;
      margin-top:20px;
      padding:12px 25px;
      border:1px solid var(--green);
      color:white;
      text-decoration:none;
      transition:.3s;
    }

    .btn:hover{
      background:var(--green);
      color:#000;
      box-shadow:0 0 20px var(--green-glow);
    }

    @keyframes flicker{
      0%,100%{opacity:1}
      50%{opacity:.85}
    }

    /* SECTION */
    section{
      padding:80px 40px;
    }

    .title{
      text-align:center;
      font-size:40px;
      font-family:Orbitron;
      margin-bottom:40px;
    }

    .title span{color:var(--green)}

    .title::after{
      content:'';
      display:block;
      width:80px;
      height:2px;
      background:var(--green);
      margin:10px auto;
    }

    /* TEAMS */
    .teams-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      max-width:1000px;
      margin:auto;
    }

    .team-card{
      background:var(--card);
      padding:20px;
      border:1px solid rgba(0,255,156,0.1);
      transition:.3s;
      cursor:pointer;
    }

    .team-card:hover{
      transform:translateY(-6px) scale(1.02);
      box-shadow:0 10px 40px var(--green-glow);
    }

    /* ROSTER */
    .roster{
      max-width:1000px;
      margin:auto;
      margin-bottom:80px;
    }

    .roster h3{
      font-family:Orbitron;
      font-size:26px;
      margin-bottom:10px;
    }

    .coaches, .players{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:20px;
    }

    .badge{
      background:var(--card);
      padding:10px 14px;
      border:1px solid rgba(0,255,156,0.15);
      transition:.2s;
    }

    .badge:hover{
      transform:scale(1.05);
      box-shadow:0 0 10px var(--green-glow);
    }

    /* ANIM */
    .fade{
      opacity:0;
      transform:translateY(20px);
      transition:all .6s ease;
    }

    .fade.show{
      opacity:1;
      transform:translateY(0);
    }
  </style>
</head>
<body>

<nav>
  <div class="brand">ARG<span>EA</span></div>
  <div class="nav-links">
    <a href="#teams">Teams</a>
    <a href="#rosters">Rosters</a>
  </div>
</nav>

<header class="hero fade">
  <h1>ARG<span>EA</span></h1>
  <p>Three teams. One identity. Zero mercy.</p>
  <a class="btn" href="#teams">Ver equipos</a>
</header>

<section id="teams" class="fade">
  <div class="title">Nuestros <span>Equipos</span></div>
  <div id="teamsGrid" class="teams-grid"></div>
</section>

<section id="rosters" class="fade">
  <div class="title">Rosters</div>
  <div id="rostersContainer"></div>
</section>

<script>
const data = {
  teams: [
    { name:"Vira", desc:"Equipo principal competitivo" },
    { name:"Luma", desc:"Equipo amateur en crecimiento" },
    { name:"Nira", desc:"Academia de desarrollo" }
  ],
  rosters: {
    Vira:{ coaches:["MIRIAM","ÓSCAR"], players:["ROBIN","RULY","SPARKL","PILLAGER","RAY","SLY","MONK","SCOPLESS"] },
    Luma:{ coaches:["FERRI"], players:["EXPLIC","H4PPY","KIIING","LIL"] },
    Nira:{ coaches:["AINA (CEO)","COLTY (Manager)"], players:["TEKAH","LYPERY","DANI","PATATA","ALFON","GONZA","CARTOCOC"] }
  }
};

const teamsGrid = document.getElementById("teamsGrid");
data.teams.forEach(t=>{
  teamsGrid.innerHTML += `
    <div class="team-card">
      <h3>${t.name}</h3>
      <p>${t.desc}</p>
    </div>`;
});

const rosters = document.getElementById("rostersContainer");
Object.keys(data.rosters).forEach(team=>{
  const r = data.rosters[team];
  rosters.innerHTML += `
    <div class="roster">
      <h3>${team}</h3>
      <div class="coaches">
        ${r.coaches.map(c=>`<div class="badge">${c}</div>`).join("")}
      </div>
      <div class="players">
        ${r.players.map(p=>`<div class="badge">${p}</div>`).join("")}
      </div>
    </div>`;
});

const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add("show");
  });
});
document.querySelectorAll(".fade").forEach(el=>observer.observe(el));
</script>

</body>
</html>
