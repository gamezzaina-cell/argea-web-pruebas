<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARGEA — Valorant eSports Organization</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#0b0f17;
      --card:#121a2a;
      --accent:#ff4655;
      --text:#e7ecf3;
      --muted:#9aa4b2;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:Rajdhani, sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow-x:hidden;
    }

    /* ================= NAV ================= */
    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 40px;
      position:sticky;
      top:0;
      background:rgba(11,15,23,0.8);
      backdrop-filter: blur(10px);
      z-index:10;
    }

    .brand{
      font-weight:700;
      letter-spacing:2px;
      font-size:20px;
    }

    .brand span{color:var(--accent)}

    .nav-links a{
      margin:0 10px;
      color:var(--muted);
      text-decoration:none;
      transition:.2s;
    }

    .nav-links a:hover{color:var(--text)}

    /* ================= HERO ================= */
    .hero{
      text-align:center;
      padding:120px 20px 80px;
    }

    .hero h1{
      font-size:72px;
      letter-spacing:4px;
    }

    .hero h1 span{color:var(--accent)}

    .hero p{color:var(--muted);margin-top:10px}

    .btn{
      display:inline-block;
      margin:10px;
      padding:10px 20px;
      border:1px solid var(--accent);
      color:var(--text);
      text-decoration:none;
      transition:.2s;
    }

    .btn:hover{
      background:var(--accent);
    }

    /* ================= SECTIONS ================= */
    section{
      padding:80px 40px;
    }

    .title{
      text-align:center;
      font-size:36px;
      margin-bottom:40px;
    }

    .title span{color:var(--accent)}

    /* ================= TEAMS ================= */
    .teams-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      max-width:1000px;
      margin:auto;
    }

    .team-card{
      background:var(--card);
      padding:20px;
      border-left:3px solid var(--accent);
      transition:.2s;
    }

    .team-card:hover{
      transform:translateY(-5px);
    }

    /* ================= ROSTER ================= */
    .roster{
      max-width:1000px;
      margin:auto;
      margin-bottom:100px;
    }

    .roster h3{
      font-size:28px;
      margin-bottom:10px;
    }

    .coaches, .players{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:20px;
    }

    .badge{
      background:var(--card);
      padding:8px 12px;
      border-left:2px solid var(--accent);
    }

    /* ================= ANIMATION ================= */
    .fade{
      opacity:0;
      transform:translateY(20px);
      transition:all .6s ease;
    }

    .fade.show{
      opacity:1;
      transform:translateY(0);
    }
  </style>
</head>
<body>

<nav>
  <div class="brand">ARG<span>EA</span></div>
  <div class="nav-links">
    <a href="#teams">Teams</a>
    <a href="#rosters">Rosters</a>
  </div>
</nav>

<header class="hero fade">
  <h1>ARG<span>EA</span></h1>
  <p>Three teams. One identity. Zero mercy.</p>
  <a class="btn" href="#teams">Ver equipos</a>
</header>

<!-- ================= TEAMS ================= -->
<section id="teams" class="fade">
  <div class="title">Nuestros <span>Equipos</span></div>
  <div id="teamsGrid" class="teams-grid"></div>
</section>

<!-- ================= ROSTERS ================= -->
<section id="rosters" class="fade">
  <div class="title">Rosters</div>
  <div id="rostersContainer"></div>
</section>

<script>

const data = {
  teams: [
    { name:"Vira", desc:"Equipo principal competitivo" },
    { name:"Luma", desc:"Equipo amateur en crecimiento" },
    { name:"Nira", desc:"Academia de desarrollo" }
  ],

  rosters: {
    Vira:{
      coaches:["MIRIAM","ÓSCAR"],
      players:["ROBIN","RULY","SPARKL","PILLAGER","RAY","SLY","MONK","SCOPLESS"]
    },
    Luma:{
      coaches:["FERRI"],
      players:["EXPLIC","H4PPY","KIIING","LIL"]
    },
    Nira:{
      coaches:["AINA (CEO)","COLTY (Manager)"],
      players:["TEKAH","LYPERY","DANI","PATATA","ALFON","GONZA","CARTOCOC"]
    }
  }
};

// ================= RENDER TEAMS =================
const teamsGrid = document.getElementById("teamsGrid");

data.teams.forEach(t=>{
  teamsGrid.innerHTML += `
    <div class="team-card">
      <h3>${t.name}</h3>
      <p>${t.desc}</p>
    </div>
  `;
});

// ================= RENDER ROSTERS =================
const rosters = document.getElementById("rostersContainer");

Object.keys(data.rosters).forEach(team=>{

  const r = data.rosters[team];

  rosters.innerHTML += `
    <div class="roster">
      <h3>${team}</h3>

      <div class="coaches">
        ${r.coaches.map(c=>`<div class="badge">${c}</div>`).join("")}
      </div>

      <div class="players">
        ${r.players.map(p=>`<div class="badge">${p}</div>`).join("")}
      </div>
    </div>
  `;

});

// ================= ANIMATION =================
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add("show");
  });
});

document.querySelectorAll(".fade").forEach(el=>observer.observe(el));

</script>

</body>
</html>
